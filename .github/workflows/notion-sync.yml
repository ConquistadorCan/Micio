name: Notion Sync

on:
  issues:
    types: [opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue to Notion
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB: "331286a8e99c80f5a955f3e4fcad5df2"
          NOTION_PROJECTS_DB: "331286a8e99c80d9997ad2606dbbbdfd"
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueState = context.payload.issue.state;
            const repoName = context.repo.repo;

            const notionKey = process.env.NOTION_API_KEY;
            const tasksDb = process.env.NOTION_TASKS_DB;
            const projectsDb = process.env.NOTION_PROJECTS_DB;

            const headers = {
              "Authorization": `Bearer ${notionKey}`,
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
            };

            const projectSearch = await fetch(`https://api.notion.com/v1/databases/${projectsDb}/query`, {
              method: "POST",
              headers,
              body: JSON.stringify({
                filter: { property: "Name", title: { equals: repoName } }
              })
            });
            const projectData = await projectSearch.json();
            const projectPageId = projectData.results?.[0]?.id ?? null;

            const taskSearch = await fetch(`https://api.notion.com/v1/databases/${tasksDb}/query`, {
              method: "POST",
              headers,
              body: JSON.stringify({
                filter: {
                  and: [
                    { property: "GitHub Issue", number: { equals: issueNumber } },
                    { property: "Project", relation: { contains: projectPageId } }
                  ]
                }
              })
            });
            const taskData = await taskSearch.json();
            const existingTask = taskData.results?.[0] ?? null;

            const isDone = issueState === "closed";

            if (existingTask) {
              await fetch(`https://api.notion.com/v1/pages/${existingTask.id}`, {
                method: "PATCH",
                headers,
                body: JSON.stringify({
                  properties: {
                    "Durum": { checkbox: isDone }
                  }
                })
              });
              console.log(`Updated task for issue #${issueNumber} → Durum: ${isDone}`);
            } else {
              const properties = {
                "Task Name": { title: [{ text: { content: issueTitle } }] },
                "Durum": { checkbox: isDone },
                "GitHub Issue": { number: issueNumber }
              };

              if (projectPageId) {
                properties["Project"] = { relation: [{ id: projectPageId }] };
              }

              await fetch("https://api.notion.com/v1/pages", {
                method: "POST",
                headers,
                body: JSON.stringify({
                  parent: { database_id: tasksDb },
                  icon: { type: "emoji", emoji: "🔧" },
                  properties
                })
              });
              console.log(`Created task for issue #${issueNumber}: "${issueTitle}"`);
            }
